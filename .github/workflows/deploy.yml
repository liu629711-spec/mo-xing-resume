name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 安装依赖并构建 admin（Vite 打包 decap-cms-app + Node 内置模块 polyfill）
      # 用 npm install 而非 npm ci，因为仓库未提交 package-lock.json
      - run: npm install --no-audit --no-fund --legacy-peer-deps
      - run: npm run build:admin

      # 构建期生成 data/<name>/index.json 文件列表
      - name: Generate data indexes
        run: node scripts/gen-index.mjs

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
