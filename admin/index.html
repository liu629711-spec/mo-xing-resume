<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨行简历 · 内容后台</title>
</head>
<body>
  <!-- 规范化 hash：去掉 Decap CMS hash 路由的 / 前缀，让 Identity widget 识别 token -->
  <script>
    (function () {
      if (location.hash && /^#\/.*(token=)/.test(location.hash)) {
        var clean = location.hash.replace(/^#\/?/, '#');
        history.replaceState(null, '', location.pathname + clean);
      }
    })();
  </script>

  <!-- Netlify Identity widget（处理邀请/重置 token；GitHub OAuth 登录走 CMS 自带流程） -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', (user) => {
        if (!user) {
          window.netlifyIdentity.on('login', () => location.reload());
        }
      });
      window.netlifyIdentity.on('logout', () => location.reload());
    }
  </script>

  <!-- React 18（decap-cms-app 3.x UMD 不再自带 React，必须手动加载） -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Decap CMS 3.x（支持 GitHub OAuth implicit 直连，不走 Netlify 代理） -->
  <script src="https://unpkg.com/decap-cms-app@3.3.5/dist/decap-cms-app.js"></script>
  <script>
    // UMD 模式下需手动初始化 CMS
    if (window.DecapCmsApp) {
      window.DecapCmsApp.init();
    }
  </script>
</body>
</html>
