<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨行简历 · 内容后台</title>
</head>
<body>
  <!-- React 18（decap-cms-app 3.x UMD 把 React 作为外部 peer 依赖，需手动加载） -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Decap CMS 3.x UMD：支持 locale 汉化 + GitHub OAuth implicit 直连，需手动 init -->
  <script src="https://unpkg.com/decap-cms-app@3.14.1/dist/decap-cms-app.js"></script>
  <script>
    // UMD 全局名因版本而异，兼容多种写法
    (function () {
      var CMS = window.DecapCmsApp || window.decapCMS || window.CMS;
      if (CMS && typeof CMS.init === 'function') {
        CMS.init();
      }
    })();
  </script>
</body>
</html>
