<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨行简历 · 内容后台</title>
</head>
<body>
  <!-- 规范化 hash：去掉 Decap CMS hash 路由的 / 前缀，让 Identity widget 识别 token -->
  <script>
    (function () {
      if (location.hash && /^#\/.*(token=)/.test(location.hash)) {
        var clean = location.hash.replace(/^#\/?/, '#');
        history.replaceState(null, '', location.pathname + clean);
      }
    })();
  </script>

  <!-- Netlify Identity widget（处理邀请/重置 token；GitHub OAuth 登录走 CMS 自带流程） -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', (user) => {
        if (!user) {
          window.netlifyIdentity.on('login', () => location.reload());
        }
      });
      window.netlifyIdentity.on('logout', () => location.reload());
    }
  </script>

  <!-- React 16（netlify-cms-app 2.x UMD 把 React 作为外部 peer 依赖，需手动加载；2.x 用 React 16 不是 18） -->
  <script src="https://unpkg.com/react@16.14.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@16.14.0/umd/react-dom.production.min.js"></script>

  <!-- netlify-cms-app 2.x UMD：读到 window.React 后加载即自动 init -->
  <script src="https://unpkg.com/netlify-cms-app@2.15.72/dist/netlify-cms-app.js"></script>
</body>
</html>
